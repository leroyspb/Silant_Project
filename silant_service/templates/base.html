<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой Силант - Электронная сервисная книжка</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo">
                <img src="{% static 'images/logo.png' %}" alt="Силант" height="50">
            </div>
            {% if user.is_authenticated %}
            <div class="nav-links">
                <a href="{% url 'machine_list' %}">МАШИНЫ</a>
                <a href="{% url 'maintenance_list' %}">ТО</a>
                <a href="{% url 'complaint_list' %}">РЕКЛАМАЦИИ</a>
            </div>
            {% endif %}
            <div class="contacts">
                +7-8352-20-12-09, telegram
            </div>
            <div class="auth">
                {% if user.is_authenticated %}
                    {{ user.username }}
                    <a href="{% url 'account_logout' %}">Выйти</a>
                {% else %}
                    <a href="{% url 'account_login' %}">Авторизация</a>
                {% endif %}
            </div>
        </div>
    </header>
    
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <footer>
        <div class="container footer-container">
            <div>+7-8352-20-12-09, telegram</div>
            <div>© Мой Силант 2022</div>
        </div>
    </footer>
    
    <!-- Подключение JavaScript -->
    <script src="{% static 'js/tabs.js' %}"></script>
    <script src="{% static 'js/confirm.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/filters.js' %}"></script>
</body>
</html>
