{% extends 'base.html' %}

{% block content %}
<h1>{% if form.instance.pk %}Редактирование машины{% else %}Добавление новой машины{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    
    {% for field in form %}
    <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="errors">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endfor %}
    
    <button type="submit" class="btn" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Сохранить</button>
    <a href="{% url 'machine_list' %}" class="btn" style="background-color: #D20A11; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Отмена</a>
</form>

<style>
.form-group {
    margin-bottom: 15px;
}
.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}
.form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
}
.errors {
    color: red;
    font-size: 12px;
    margin-top: 5px;
}
</style>
{% endblock %}
