{% extends 'base.html' %}

{% block content %}
<h1>{% if form.instance.pk %}Редактирование машины{% else %}Добавление машины{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    
    {% for field in form %}
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">{{ field.label }}:</label>
        {{ field }}
        {% if field.errors %}
        <div style="color: #D20A11; font-size: 12px;">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endfor %}
    
    <button type="submit" style="background-color: #163E6C; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">Сохранить</button>
    <a href="{% url 'machine_detail' form.instance.pk %}" style="background-color: #D20A11; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px;">Отмена</a>
</form>
{% endblock %}
