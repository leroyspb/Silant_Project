{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="logout-container">
    <div class="logout-card">
        <div class="logout-header">
            <h1>Выход из системы</h1>
            <p>Вы уверены, что хотите выйти из электронной сервисной книжки?</p>
        </div>
        
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-logout">Выйти</button>
            <a href="{% url 'machine_list' %}" class="btn-cancel">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
