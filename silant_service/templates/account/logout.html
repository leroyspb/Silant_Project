{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="logout-container">
    <div class="logout-card">
        <div class="logout-header">
            <h1>Выход из системы</h1>
            <p>Вы уверены, что хотите выйти из электронной сервисной книжки?</p>
        </div>
        
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-logout">Выйти</button>
            <a href="{% url 'machine_list' %}" class="btn-cancel">Отмена</a>
        </form>
    </div>
</div>

<style>
.logout-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
    padding: 40px 20px;
}

.logout-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    max-width: 450px;
    width: 100%;
    padding: 40px;
    text-align: center;
}

.logout-header h1 {
    font-size: 28px;
    color: #163E6C;
    margin-bottom: 15px;
}

.logout-header p {
    color: #666;
    margin-bottom: 30px;
}

.btn-logout {
    background-color: #D20A11;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-right: 15px;
}

.btn-logout:hover {
    background-color: #a0080d;
}

.btn-cancel {
    background-color: #163E6C;
    color: white;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
    display: inline-block;
}

.btn-cancel:hover {
    background-color: #0f2e4d;
}
</style>
{% endblock %}
