{% extends 'base.html' %}

{% block content %}

<h1>Редактирование технического обслуживания</h1>

<form method="post">
    {% csrf_token %}
    
    {% for field in form %}
    <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
        <div class="help-text" style="margin-top: 5px;">
            {{ field.help_text|safe }}
        </div>
        {% endif %}
        {% if field.errors %}
        <div class="errors" style="color: red;">
            {{ field.errors }}
        </div>
        {% endif %}
    </div>
    {% endfor %}
    
    <button type="submit" class="btn" style="background-color: #163E6C; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Сохранить</button>
    <a href="{% url 'machine_detail' machine.pk %}" class="btn" style="background-color: #D20A11; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Отмена</a>
</form>

<style>
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #163E6C;
    }
    select, input, textarea {
        width: 100%;
        max-width: 400px;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }
    input[type="date"] {
        width: auto;
        min-width: 200px;
    }
    .error {
        color: #D20A11;
        font-size: 12px;
        margin-top: 5px;
    }
    .form-buttons {
        margin-top: 20px;
    }
    .btn-save {
        background-color: #163E6C;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 10px;
    }
    .btn-cancel {
        background-color: #D20A11;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 4px;
        display: inline-block;
    }
    .btn-save:hover, .btn-cancel:hover {
        opacity: 0.85;
    }

     .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-group input, .form-group select, .form-group textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    .help-text {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
    }
    .btn-add {
        display: inline-block;
        padding: 3px 8px;
        background-color: #28a745;
        color: white;
        text-decoration: none;
        border-radius: 3px;
        font-size: 12px;
    }
    .btn-add:hover {
        background-color: #218838;
    }
</style>
{% endblock %}
